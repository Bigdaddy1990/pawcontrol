name: pre-commit-autofix

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write 
  id-token: write

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: ${{ inputs.python-version != '' && inputs.python-version || (vars.PYTHON_VERSION != '' && vars.PYTHON_VERSION || '3.14') }}
      HA_SPEC: ${{ inputs.home-assistant-spec != '' && inputs.home-assistant-spec || (vars.HA_VERSION != '' && format('=={0}', vars.HA_VERSION) || '') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_test.txt
            pyproject.toml

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install deps (uv)
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements_test.txt --prerelease=allow
          uv pip install --system --upgrade pre-commit ruff pyupgrade flake8-type-checking reorder-python-imports
          uv cache prune --ci

      - name: Run pre-commit with fixes
        run: |
          ruff check . --fix || true
          ruff check . --fix --unsafe-fixes || true
          ruff check . --target-version py314 || true
          ruff check . --extend-select RUF100 || true
          ruff check . --preview || true
          ruff check . --output-format=github || true
          ruff format
          python scripts/enforce_docstring_baseline.py --update
          python -m scripts.sync_contributor_guides
          # --py314-plus is a hook arg declared in .pre-commit-config.yaml, not a
          # valid CLI flag for `pre-commit run`. Same for --keep-updates.
          pre-commit run --all-files || true
          pre-commit run --hook-stage manual python-typing-update --all-files || true

      - name: Verify contributor guides
        run: |
          python -m scripts.sync_contributor_guides --check

      - name: Run test requirements and localization sync
        run: |
          python -m scripts.enforce_test_requirements
          python -m scripts.sync_localization_flags \
            --allowlist scripts/sync_localization_flags.allowlist \
            --check

      - name: pre-commit-ci-lite
        uses: pre-commit-ci/lite-action@v1.1.0
        if: always()
